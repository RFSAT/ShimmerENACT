name: Build APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Gradle wrapper permissions ────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Run lint
        run: ./gradlew lint --stacktrace
        continue-on-error: true   # lint warnings shouldn't fail the build

      # ── Unit tests ───────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew test --stacktrace

      # ── Build debug APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Build release APK (unsigned) ─────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      # ── Sign release APK (optional – only if secrets are configured) ─────────
      # To enable signing:
      #   1. Generate a keystore: keytool -genkey -v -keystore release.jks ...
      #   2. Base64 encode it:    base64 -i release.jks | pbcopy
      #   3. Add GitHub secrets:  KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      - name: Sign release APK
        if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          BUILD_TOOLS_VERSION: "34.0.0"

      # ── Upload debug APK artifact ─────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Upload release APK artifact ───────────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 90

      # ── Create GitHub release on version tags ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ShimmerENACT ${{ github.ref_name }}
          body: |
            ## ShimmerENACT ${{ github.ref_name }}

            Native Android application for Shimmer3 sensor data acquisition.
            Developed by **RFSAT Limited** for the **ENACT** project (Horizon Europe Grant 101157151).

            ### Supported sensors
            - GSR+ Unit SR48-5-0 (default BT radio: A096)
            - EXG Unit SR47-6-0 (default BT radio: A077)
            - Custom Shimmer3 sensor

            ### Installation
            Download `app-release-unsigned.apk` (or signed variant if available),
            enable *Install from unknown sources* on your Android device, and install.

            ### Requirements
            - Android 8.0 (API 26) or higher
            - Bluetooth Classic support
          files: |
            app/build/outputs/apk/release/app-release*.apk
            app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
