name: Build & Test

on:
  push:
    branches: [ "**" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.jks
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
            echo "Keystore decoded ✓"
          else
            echo "KEYSTORE_BASE64 secret not set — release will use debug signing"
          fi

      - name: Write Mapbox tokens to gradle.properties
        run: |
          mkdir -p ~/.gradle
          echo "MAPBOX_DOWNLOADS_TOKEN=${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}"       >> ~/.gradle/gradle.properties

      # gradle-wrapper.jar is not committed to the repo.
      # Install Gradle directly and use it to generate a legitimate wrapper jar.
      - name: Generate gradle-wrapper.jar
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
            | grep -oP '(?<=gradle-)[0-9.]+(?=-)')
          echo "Gradle version: $GRADLE_VERSION"
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          chmod +x "/tmp/gradle-install/gradle-${GRADLE_VERSION}/bin/gradle"
          "/tmp/gradle-install/gradle-${GRADLE_VERSION}/bin/gradle" wrapper \
            --gradle-version "$GRADLE_VERSION" --distribution-type bin
          echo "gradle-wrapper.jar: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Extract version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | grep -v '//' | head -1 \
            | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ')
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          MAPBOX_ACCESS_TOKEN:    ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-${{ steps.version.outputs.name }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease --stacktrace
        env:
          MAPBOX_ACCESS_TOKEN:    ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          KEYSTORE_PATH:          ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS:              ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:           ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:         ${{ secrets.STORE_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-${{ steps.version.outputs.name }}-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-${{ steps.version.outputs.name }}-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ShimmerENACT v${{ steps.version.outputs.name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
