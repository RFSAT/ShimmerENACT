name: Build & Test

on:
  push:
    branches: [ "**" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        if: github.ref_type == 'tag'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.jks
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
          fi

      # Write Mapbox tokens into gradle.properties so settings.gradle can read them
      # via providers.gradleProperty() during dependency resolution.
      - name: Write Mapbox tokens to gradle.properties
        run: |
          mkdir -p ~/.gradle
          echo "MAPBOX_DOWNLOADS_TOKEN=${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}"       >> ~/.gradle/gradle.properties

      # Download the legitimate gradle-wrapper.jar from the official Gradle distribution.
      # The jar in the repo may be absent or corrupt (known issue when committed via
      # a network-restricted environment). The GitHub Actions runner can always reach
      # services.gradle.org, so we fetch it here before invoking ./gradlew.
      - name: Download gradle-wrapper.jar
        run: |
          VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
            | grep -oP '(?<=gradle-)[0-9.]+(?=-)')
          echo "Gradle version: $VERSION"
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-${VERSION}-bin.zip" \
            -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip \
            "gradle-${VERSION}/lib/plugins/gradle-wrapper-${VERSION}.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          unzip -p /tmp/gradle.zip \
            "gradle-${VERSION}/lib/gradle-wrapper-*.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          python3 << 'EOF'
          import zipfile, sys
          with zipfile.ZipFile('/tmp/gradle.zip') as z:
              candidates = [n for n in z.namelist()
                            if 'gradle-wrapper' in n and n.endswith('.jar')]
              print(f"Wrapper jar candidates: {candidates}", file=sys.stderr)
              with z.open(candidates[0]) as src, \
                   open('gradle/wrapper/gradle-wrapper.jar', 'wb') as dst:
                  dst.write(src.read())
              print(f"Extracted: {candidates[0]}", file=sys.stderr)
          EOF
          SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          echo "gradle-wrapper.jar: ${SIZE} bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: gradle-wrapper.jar is too small (${SIZE} bytes) — extraction failed"
            exit 1
          fi

      - name: Extract version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | grep -v '//' | head -1 \
            | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ')
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          MAPBOX_ACCESS_TOKEN:    ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-${{ steps.version.outputs.name }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build release APK and AAB
        if: github.ref_type == 'tag'
        run: ./gradlew assembleRelease bundleRelease --stacktrace
        env:
          MAPBOX_ACCESS_TOKEN:    ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          KEYSTORE_PATH:          ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS:              ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:           ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:         ${{ secrets.STORE_PASSWORD }}

      - name: Upload release APK
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-${{ steps.version.outputs.name }}-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload AAB
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ShimmerENACT-${{ steps.version.outputs.name }}-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ShimmerENACT v${{ steps.version.outputs.name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
